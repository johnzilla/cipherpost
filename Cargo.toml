# Phase 5 Plan 05-02: PASS-09 scripted-roundtrip integration test under MockTransport
# (D-P5-09). Requires the `mock` feature; gates the CI guarantee that scripted
# send→receive works end-to-end with no TTY, via --passphrase-file and --passphrase-fd.
[[test]]
