[package]
name = "cipherpost"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Self-sovereign, serverless, accountless CLI for cryptographic-material handoff over Mainline DHT via PKARR."
repository = "https://github.com/johnzilla/cipherpost"
rust-version = "1.88"

[lib]
name = "cipherpost"
path = "src/lib.rs"

[[bin]]
name = "cipherpost"
path = "src/main.rs"

[features]
mock = []

[dependencies]
# DHT transport — no_relays + dht feature only; inherits ed25519-dalek 3.x pre-release
pkarr = { version = "5.0.3", default-features = false, features = ["dht"] }
# HARD PIN: pkarr 5.0.3 depends on ^3.0.0-pre.1 and cargo won't auto-pick newer pre-releases without =.
# Do NOT change until pkarr publishes on a stable ed25519-dalek 3.x.
ed25519-dalek = "=3.0.0-pre.5"
age = "0.11"
argon2 = "0.5"
hkdf = "0.12"
sha2 = "0.10"
zeroize = { version = "1", features = ["zeroize_derive"] }
secrecy = "0.10"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1"
thiserror = "2"
base64 = "0.22"
bech32 = "0.9"
dirs = "5"
dialoguer = "0.12"
serde = { version = "1", features = ["derive"] }
# NOTE: no extra serde_json features — key-ordering features break canonical-JSON invariants.
serde_json = "1"
serde_canonical_json = "1"
rand = "0.8"
# Local-time rendering on the acceptance screen (D-ACCEPT-02 / RECV-04).
# `clock` feature pulls in `iana-time-zone` for local-offset lookup. std alone
# has no stable tz-aware local-time API.
chrono = { version = "0.4", default-features = false, features = ["clock"] }
# Phase 6: X.509 DER/PEM parsing. `verify` feature STAYS OFF — would pull `ring`
# which is on the supply-chain rejected list (see .planning/research/SUMMARY.md
# §Phase 6). `default-features = false` is belt-and-suspenders: 0.16 has
# `default = []` so the result is identical, but explicit intent aids audit.
# Do NOT bump to 0.17 — that version breaks to nom 8.0.
x509-parser = { version = "0.16", default-features = false }
# Phase 7: OpenPGP binary packet-stream parsing. Exact-pin (`=0.19.0`) because
# the supply-chain matrix (MSRV 1.88, RUSTSEC-2023-0071 via rsa 0.9, unconditional
# ed25519-dalek 2.1.1 pull) is version-specific — any upstream change requires
# re-running Phase 7 research. `default-features = false` disables `bzip2`
# (we do not encounter compressed key material — keys are not messages) and
# `asm` (supply-chain prefers pure-Rust). See D-P7-04 + research §"Crate: pgp".
#
# Transitive advisory accepted: RUSTSEC-2023-0071 (Marvin timing attack on rsa 0.9).
# Cipherpost parses PGP for metadata display only — never decrypts/signs with RSA.
# See deny.toml [advisories] ignore entry below.
pgp = { version = "=0.19.0", default-features = false }

# Phase 7 Plan 02: rsa is already pulled transitively by pgp 0.19.0 (see RUSTSEC
# acceptance comment above). preview.rs needs `rsa::traits::PublicKeyParts` in
# scope to read RSA modulus bit-size for the `Key:         RSA-2048` banner
# line. Re-exporting through a direct dep is the cleanest path (no new supply
# chain risk — the version pin matches what pgp resolves to). We do NOT enable
# any rsa feature; default features are fine for the trait-only import.
rsa = { version = "0.9", default-features = false }

