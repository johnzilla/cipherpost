[[test]]
name = "material_x509_envelope_round_trip"
path = "tests/material_x509_envelope_round_trip.rs"

# Phase 6 Plan 04: X509 ingest pipeline coverage (positive + negative paths + oracle hygiene).
[[test]]
name = "material_x509_ingest"
path = "tests/material_x509_ingest.rs"

# Phase 6 Plan 04: X509 self-mode round-trip under MockTransport (X509-09).
[[test]]
name = "x509_roundtrip"
path = "tests/x509_roundtrip.rs"
required-features = ["mock"]

# Phase 6 Plan 04: X509 banner render golden-string test.
[[test]]
name = "x509_banner_render"
path = "tests/x509_banner_render.rs"

# Phase 6 Plan 04: Error-oracle hygiene for Error::InvalidMaterial (X509-08).
[[test]]
name = "x509_error_oracle"
path = "tests/x509_error_oracle.rs"

# Phase 6 Plan 04: CI-visible dep-tree guard — ring/aws-lc must NEVER appear.
[[test]]
name = "x509_dep_tree_guard"
path = "tests/x509_dep_tree_guard.rs"

[dev-dependencies]
tempfile = "3"
proptest = "1"
# Plan 02 Task 2's tests/identity_passphrase_argv_rejected.rs uses these to spawn
# the compiled binary and assert exit code + stderr substring. Declared here (not in
# Plan 02) because Cargo.toml is owned by Plan 01. Both crates are MIT/Apache-2.0 —
# allowed by deny.toml's license allowlist.
assert_cmd = "2"
predicates = "3"
# Serializes tests that mutate the CIPHERPOST_HOME env var (integration tests in
# identity_perms_0600.rs, identity_phc_header.rs, debug_leak_scan.rs). Rust's
# default parallel test runner races on process-global env; #[serial] forces
# these tests to run one at a time within their crate.
serial_test = "3"
# Phase 5 Plan 05-01: fd-lifecycle test (tests/passphrase_fd_borrowed.rs) uses
# libc::pipe / libc::write / libc::close / libc::fcntl directly to build a pipe,
# pass its read-end fd through resolve_passphrase, and then assert fcntl(fd,
# F_GETFD) != -1 after the call (proves BorrowedFd did not close the caller's
# fd — Pitfall #31). MIT/Apache-2.0.
libc = "0.2"

[profile.release]
panic = "abort"      # prevents panic backtrace from leaking stack contents (Security Mistakes table, PITFALLS.md)
lto = "thin"
codegen-units = 1
